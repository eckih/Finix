# Entwicklung: Quellcode als Volume, damit Änderungen ohne Rebuild wirksam werden.
# Start: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Backend: uvicorn --reload lädt bei Änderungen neu.
# Frontend: Vite HMR übernimmt Änderungen automatisch (npm run dev).

name: finix

services:
  backend:
    volumes:
      - ./backend:/app/backend
      - ./USA_Kontostand.py:/app/USA_Kontostand.py
      - ./persist.py:/app/persist.py
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    volumes:
      - ./frontend:/app
      # Eigenes Volume für node_modules, damit im Container Linux-Binaries (z. B. Rollup) genutzt werden
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  frontend_node_modules:
